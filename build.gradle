plugins {
	id 'java'
	id 'org.springframework.boot' version '4.0.5'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.benchmark'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-webmvc:4.0.5'
	implementation 'org.springframework.boot:spring-boot-starter-actuator:4.0.5'
	implementation 'org.springframework.boot:spring-boot-starter-websocket:4.0.5'
	implementation 'org.springframework.boot:spring-boot-starter-thymeleaf:4.0.5'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa:4.0.5'
	
	runtimeOnly 'org.postgresql:postgresql:42.7.10'

	testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test:4.0.5'

	testRuntimeOnly 'org.junit.platform:junit-platform-launcher:6.0.3'

}

tasks.named('test') {
	useJUnitPlatform()
}

jar {
	enabled = false
}
