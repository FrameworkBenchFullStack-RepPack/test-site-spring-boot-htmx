<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="results">
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Category</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="person : ${people}">
                <td th:text="${person.name}">Name</td>
                <td th:text="${person.age}">Age</td>
                <td th:text="${person.category.name}">Category</td>
            </tr>
        </tbody>
    </table>
    <p th:if="${#lists.isEmpty(people)}" class="no-data-message">No people found.</p>
</th:block>
</body>
</html>
